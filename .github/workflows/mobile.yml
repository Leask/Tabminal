name: Mobile Checks

on:
  push:
    branches:
      - main
      - mobile
  pull_request:

jobs:
  apple:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Run Node test suite
        run: npm test

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Validate mobile shell scripts
        run: bash -n mobile/ios/*.sh mobile/ghostty-vendor/scripts/*.sh

      - name: Run Swift package tests
        run: |
          cd mobile/ios
          swift test

      - name: Generate Apple app project
        run: |
          cd mobile/ios
          xcodegen generate

      - name: Build macOS app shell
        run: |
          cd mobile/ios
          xcodebuild \
            -project TabminalMobileApp.xcodeproj \
            -scheme TabminalMobileApp \
            -destination 'platform=macOS' \
            build
