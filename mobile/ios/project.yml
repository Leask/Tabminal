name: TabminalMobileApp
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.45.0
configs:
  Debug: debug
  Release: release
packages:
  TabminalMobile:
    path: .
targets:
  TabminalMobileApp:
    type: application
    supportedDestinations:
      - iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
    dependencies:
      - package: TabminalMobile
        product: TabminalMobileCore
      - package: TabminalMobile
        product: TabminalIOSKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leask.tabminal.mobile
        PRODUCT_NAME: Tabminal Mobile
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDarkContent
        SWIFT_VERSION: "6.0"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_ASSET_PATHS: "\"\""
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets: []
